<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oktoberfest Reservation Matrix</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Oktoberfest Reservation Matrix</h1>
      <p class="subtitle">Live status grid by tent and date</p>

      <section class="controls">
        <label for="timeslot">Timeslot</label>
        <select id="timeslot">
          <option value="all">All</option>
          <option value="mittag">Mittag</option>
          <option value="abend">Abend</option>
        </select>
        <button id="refreshButton">Refresh Matrix</button>
      </section>

      <section class="legend">
        <span><i class="dot status-green"></i>Green</span>
        <span><i class="dot status-red"></i>Red</span>
        <span><i class="dot status-unavail"></i>Unavail</span>
      </section>

      <div id="tableWrap" class="table-wrap">Loading matrix...</div>
      <pre id="output">Ready.</pre>
    </main>

    <script src="app.js"></script>
  </body>
</html>
