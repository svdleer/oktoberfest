<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oktoberfest Reservation Matrix</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/sandstone/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xxl-11">
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                <div class="pe-2">
                  <h1 class="h2 mb-1" data-i18n="title">Oktoberfest Reservation Matrix</h1>
                  <p class="text-muted mb-0" data-i18n="subtitle">Live status grid by tent, date, and timeslot</p>
                </div>
                <div class="btn-group lang-switch" role="group" aria-label="Language switch">
                  <button id="langEn" class="btn btn-outline-secondary active" type="button">EN</button>
                  <button id="langDe" class="btn btn-outline-secondary" type="button">DE</button>
                </div>
              </div>

              <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
                <label for="timeslot" class="form-label mb-0 fw-semibold" data-i18n="timeslotLabel">Timeslot</label>
                <select id="timeslot" class="form-select">
                  <option value="all" data-i18n-option="all">All</option>
                  <option value="mittag" data-i18n-option="mittag">Mittag</option>
                  <option value="abend" data-i18n-option="abend">Abend</option>
                </select>
                <label for="venueSelect" class="form-label mb-0 fw-semibold" data-i18n="venueLabel">Venue</label>
                <select id="venueSelect" class="form-select">
                  <option value="all" data-i18n-option="allTents">All tents</option>
                </select>
                <button id="refreshButton" class="btn btn-primary" data-i18n="refresh">Refresh</button>
              </div>

              <div class="d-flex flex-wrap gap-2 mb-3">
                <span class="badge text-bg-success status-chip" data-i18n="legendGreen">Green = Available</span>
                <span class="badge text-bg-danger status-chip" data-i18n="legendRed">Red = No products</span>
                <span class="badge text-bg-secondary status-chip" data-i18n="legendGray">Unavail = Not offered</span>
              </div>

              <div id="tableWrap" class="table-wrap">Loading matrix...</div>
              <pre id="output" class="small-status mt-3 mb-0">Ready.</pre>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
