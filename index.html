<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oktoberfest Reservation Matrix</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/sandstone/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xxl-11">
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                <div>
                  <h1 class="h2 mb-1">Oktoberfest Reservation Matrix</h1>
                  <p class="text-muted mb-0">Live status grid by tent, date, and timeslot</p>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <label for="timeslot" class="form-label mb-0 fw-semibold">Timeslot</label>
                  <select id="timeslot" class="form-select">
                    <option value="all">All</option>
                    <option value="mittag">Mittag</option>
                    <option value="abend">Abend</option>
                  </select>
                  <button id="refreshButton" class="btn btn-primary">Refresh</button>
                </div>
              </div>

              <div class="d-flex flex-wrap gap-2 mb-3">
                <span class="badge text-bg-success status-chip">Green = Available</span>
                <span class="badge text-bg-danger status-chip">Red = No products</span>
                <span class="badge text-bg-secondary status-chip">Unavail = Not offered</span>
              </div>

              <div id="tableWrap" class="table-wrap">Loading matrix...</div>
              <pre id="output" class="small-status mt-3 mb-0">Ready.</pre>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
